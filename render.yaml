services:
  - type: web
    name: agent-max
    runtime: python
    buildCommand: "pip install uv && uv sync && npm install --prefix frontend && npm run build --prefix frontend"
    startCommand: "uv run uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: OPEN_ROUTER_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
